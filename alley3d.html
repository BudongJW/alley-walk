<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>골목 산책 3D · Alley Walk</title>
<style>
  html, body { margin: 0; height: 100%; background: #06070b; overflow: hidden; }
  canvas { display: block; }
  #hud { position: fixed; left: 14px; top: 12px; color: #d9c9a8; pointer-events: none;
    font: 13px/1.5 ui-monospace, "Cascadia Mono", monospace; text-shadow: 0 1px 3px #000; opacity: .85; }
  #hud b { color: #ffba66; }
  #title { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; color: #f0e2c4; z-index: 10;
    background: radial-gradient(circle at 50% 60%, rgba(20,12,4,.2), rgba(0,0,0,.85));
    font-family: ui-serif, Georgia, serif; transition: opacity 1s ease; }
  #title h1 { font-size: clamp(28px,6vw,56px); letter-spacing:.15em; margin:0 0 .1em; color:#ffcf8a;
    text-shadow: 0 0 24px rgba(255,150,60,.5); font-weight: 500; }
  #title .ded { font-size:16px; letter-spacing:.25em; color:#e7b277; opacity:.85; margin:0 0 1em; font-style:italic; }
  #title p { margin:.2em; opacity:.8; font-size:15px; }
  #title .keys { margin-top:1.4em; font:13px ui-monospace,monospace; opacity:.7; }
  #title.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="hud"></div>
<div id="title">
  <h1>골목 산책</h1>
  <div class="ded">for 하늘</div>
  <p>밤의 빨간벽돌 골목을 걸어보세요 · WebGL</p>
  <div class="keys">W / ↑ 앞으로 · S 뒤로 · A · D 좌우 · 마우스 드래그로 둘러보기 · 클릭/탭 전진<br>R 비 켜기/끄기</div>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from "three";

const ROAD_HALF = 2.7, SEG = 5, T = 1.1; // 텍스처 1타일 = 1.1m

// ---------- 절차적 텍스처 (외부 에셋 없음) ----------
function cv(s = 256) { const c = document.createElement("canvas"); c.width = c.height = s; return c; }
function tex(c, srgb = true) {
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.anisotropy = 4;
  if (srgb) t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
function brickTexture(mortar) {
  const c = cv(256), x = c.getContext("2d");
  x.fillStyle = mortar; x.fillRect(0, 0, 256, 256);
  const bw = 64, bh = 26, gap = 5;
  for (let row = 0, y = 0; y < 256 + bh; row++, y += bh) {
    const off = (row % 2) ? bw / 2 : 0;
    for (let bx = -bw; bx < 256; bx += bw) {
      const px = bx + off + gap / 2, py = y + gap / 2, w = bw - gap, h = bh - gap;
      const hh = 6 + Math.random() * 14, ss = 44 + Math.random() * 16, ll = 24 + Math.random() * 14;
      x.fillStyle = `hsl(${hh},${ss}%,${ll}%)`;
      x.fillRect(px, py, w, h);
      for (let n = 0; n < 7; n++) { x.fillStyle = `rgba(0,0,0,${Math.random() * 0.14})`; x.fillRect(px + Math.random() * w, py + Math.random() * h, 2, 2); }
      x.fillStyle = `rgba(255,235,210,${Math.random() * 0.06})`; x.fillRect(px, py, w, 2);
    }
  }
  return c;
}
function tileTexture() {
  const c = cv(256), x = c.getContext("2d");
  x.fillStyle = "#7a3322"; x.fillRect(0, 0, 256, 256);
  const cw = 24;
  for (let cx0 = 0; cx0 < 256; cx0 += cw) {
    const g = x.createLinearGradient(cx0, 0, cx0 + cw, 0);
    g.addColorStop(0, "#582013"); g.addColorStop(0.5, "#b14e30"); g.addColorStop(1, "#582013");
    x.fillStyle = g; x.fillRect(cx0, 0, cw - 1, 256);
  }
  x.strokeStyle = "rgba(0,0,0,0.4)"; x.lineWidth = 2;
  for (let y = 0; y < 256; y += 38) { x.beginPath(); x.moveTo(0, y + 6); x.bezierCurveTo(80, y, 176, y + 12, 256, y + 4); x.stroke(); }
  return c;
}
function concreteTexture(base) {
  const c = cv(128), x = c.getContext("2d");
  x.fillStyle = base; x.fillRect(0, 0, 128, 128);
  for (let n = 0; n < 1400; n++) {
    const a = (Math.random() - 0.5) * 0.18;
    x.fillStyle = `rgba(${a > 0 ? 255 : 0},${a > 0 ? 255 : 0},${a > 0 ? 240 : 0},${Math.abs(a)})`;
    x.fillRect(Math.random() * 128, Math.random() * 128, 2, 2);
  }
  return c;
}

const brickMaps = ["#5f574c", "#665b4e", "#574e44"].map(m => tex(brickTexture(m)));
const tileMap = tex(tileTexture());
const concreteMap = tex(concreteTexture("#8d887b"));
const baseMap = tex(concreteTexture("#5b574f"));
const roadMap = tex(concreteTexture("#2c2925"));
[tileMap].forEach(t => { t.repeat.set(1, 1); });

// ---------- 재질 ----------
const brickMats = brickMaps.map((m, i) => new THREE.MeshStandardMaterial({
  map: m, bumpMap: m, bumpScale: 0.5, roughness: 0.96,
  color: [0xfff0ea, 0xf3ddd4, 0xffffff][i],
}));
const tileMats = [
  new THREE.MeshStandardMaterial({ map: tileMap, bumpMap: tileMap, bumpScale: 0.4, roughness: 0.8, color: 0xffffff }),
  new THREE.MeshStandardMaterial({ map: tileMap, bumpMap: tileMap, bumpScale: 0.4, roughness: 0.7, color: 0x6f8a5e }), // 청기와
];
const concreteMat = new THREE.MeshStandardMaterial({ map: concreteMap, bumpMap: concreteMap, bumpScale: 0.3, roughness: 0.92, color: 0xb8b2a6 });
const baseMat = new THREE.MeshStandardMaterial({ map: baseMap, roughness: 0.95, color: 0x9a958c });
const doorMats = [0x2f5630, 0x39291d, 0x4a3724, 0x2a4a4e, 0x555049].map(c => new THREE.MeshStandardMaterial({ color: c, roughness: 0.6, metalness: 0.2 }));
const glassMat = new THREE.MeshStandardMaterial({ color: 0x10161f, roughness: 0.15, metalness: 0.5 });
const litMat = new THREE.MeshStandardMaterial({ color: 0x110a02, emissive: 0xffb24a, emissiveIntensity: 1.25 });
const railMat = new THREE.MeshStandardMaterial({ color: 0x14140f, roughness: 0.5, metalness: 0.6 });
const lampGlassMat = new THREE.MeshStandardMaterial({ color: 0x1a1208, emissive: 0xffd49a, emissiveIntensity: 2.0 });
const hoodMat = new THREE.MeshStandardMaterial({ color: 0x2f5d33, roughness: 0.6 });

// 바닥 빛웅덩이 (가산 합성)
function glowTexture() {
  const c = cv(128), x = c.getContext("2d");
  const g = x.createRadialGradient(64, 64, 0, 64, 64, 64);
  g.addColorStop(0, "rgba(255,175,85,0.95)");
  g.addColorStop(0.35, "rgba(255,140,50,0.5)");
  g.addColorStop(1, "rgba(255,120,40,0)");
  x.fillStyle = g; x.fillRect(0, 0, 128, 128);
  return tex(c, false);
}
const poolMat = new THREE.MeshBasicMaterial({ map: glowTexture(), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, fog: false });

// ---------- 헬퍼: 타일링 평면 ----------
function texPlane(mat, w, h) {
  const g = new THREE.PlaneGeometry(w, h);
  const uv = g.attributes.uv;
  for (let i = 0; i < uv.count; i++) uv.setXY(i, uv.getX(i) * w / T, uv.getY(i) * h / T);
  return new THREE.Mesh(g, mat);
}
function plainPlane(mat, w, h) { return new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat); }

// ---------- 결정적 난수 ----------
function hash(n) { const x = Math.sin(n * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }

// ---------- 집 한 채 생성 (로컬: 골목은 +x, 정면 x=0) ----------
function makeHouse(i, side) {
  const key = i * 4 + (side > 0 ? 1 : 0);
  const r = (s) => hash(key * 17.3 + s * 2.13);
  const floorH = 3;
  const H = 5 + r(1) * 6.5;
  const floors = Math.max(1, Math.floor(H / floorH));
  const depth = 3.2 + r(36) * 2.0;
  const setback = r(34) < 0.4 ? 0.05 : 0.4 + r(35) * 1.1;
  const isBrick = r(20) < 0.74;
  const brickMat = brickMats[Math.floor(r(2) * 3) % 3];
  const wallMat = isBrick ? brickMat : baseMat;
  const roofTile = r(23) < 0.55;
  const tileMat = tileMats[r(24) < 0.25 ? 1 : 0];
  const basement = r(25) < 0.55;
  const stair = r(26) < 0.45;
  const lamp = ((i + (side > 0 ? 1 : 0)) % 2 === 0) && r(5) > 0.28;
  const wall = setback > 0.42 && r(37) > 0.3;
  const doorMat = doorMats[Math.floor(r(30) * 5) % 5];
  const cols = 1 + (r(31) > 0.45 ? 1 : 0);
  const baseH = basement ? 1.5 : 0;

  const g = new THREE.Group();

  // 매스: 정면(+x) + 양 측면
  const facade = texPlane(wallMat, SEG, H); facade.rotation.y = Math.PI / 2; facade.position.set(0, H / 2, 0); g.add(facade);
  const sN = texPlane(wallMat, depth, H); sN.rotation.y = Math.PI; sN.position.set(-depth / 2, H / 2, -SEG / 2); g.add(sN);
  const sF = texPlane(wallMat, depth, H); sF.position.set(-depth / 2, H / 2, SEG / 2); g.add(sF);
  const back = texPlane(wallMat, SEG, H); back.rotation.y = -Math.PI / 2; back.position.set(-depth, H / 2, 0); g.add(back);

  // 반지하 회색 베이스
  if (basement) {
    const bm = new THREE.Mesh(new THREE.BoxGeometry(depth + 0.04, baseH, SEG + 0.04), baseMat);
    bm.position.set(-depth / 2, baseH / 2, 0); g.add(bm);
  }

  // 층 콘크리트 띠 (얇은 슬랩)
  for (let f = 1; f < floors; f++) {
    const band = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.22, SEG + 0.02), concreteMat);
    band.position.set(0.06, f * floorH, 0); g.add(band);
  }

  // 창문 (콘크리트 틀 + 유리/점등) 정면에
  const addWin = (wy, wz, ww, wh, seed) => {
    const frame = plainPlane(concreteMat, ww + 0.28, wh + 0.28); frame.rotation.y = Math.PI / 2; frame.position.set(0.02, wy + wh / 2, wz); g.add(frame);
    const lit = r(seed) > 0.62;
    const pane = plainPlane(lit ? litMat : glassMat, ww, wh); pane.rotation.y = Math.PI / 2; pane.position.set(0.05, wy + wh / 2, wz); g.add(pane);
    // 콘크리트 윗인방
    const lin = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.16, ww + 0.4), concreteMat);
    lin.position.set(0.07, wy + wh + 0.22, wz); g.add(lin);
  };
  if (basement) for (let c = 0; c < 2; c++) addWin(0.55, (c - 0.5) * (SEG / 2.2), 1.0, 0.55, 90 + c * 5);
  for (let f = 1; f <= floors; f++) {
    const wy = f * floorH + 0.4;
    if (wy + 1.3 > H - (roofTile ? 0.7 : 0.3)) break;
    for (let c = 0; c < cols; c++) {
      const wz = (cols === 1 ? 0 : (c - 0.5)) * (SEG / 2.4);
      addWin(wy, wz, 1.3, 1.4, c * 13 + f * 7 + 3);
    }
  }

  // 1층 현관문
  const dz = stair ? SEG / 2 - 1.2 : 0;
  const door = plainPlane(doorMat, 1.05, 2.0); door.rotation.y = Math.PI / 2; door.position.set(0.04, baseH + 1.0, dz); g.add(door);

  // 외부 계단 (진짜 입체 스텝)
  if (stair) {
    const n = 7, topY = baseH + floorH, tread = 0.34, out = 1.1, zs = -SEG / 2 + 0.6;
    for (let k = 0; k <= n; k++) {
      const st = new THREE.Mesh(new THREE.BoxGeometry(out, 0.16, tread), concreteMat);
      st.position.set(out / 2 + 0.02, (k / n) * topY, zs + k * tread); g.add(st);
    }
    // 옆 스트링거(삼각 측판)
    const str = new THREE.Mesh(new THREE.BoxGeometry(0.12, topY, n * tread), concreteMat);
    str.position.set(out + 0.05, topY / 2, zs + n * tread / 2); g.add(str);
    // 난간
    const rail = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, Math.hypot(topY, n * tread), 6), railMat);
    rail.position.set(out + 0.05, topY / 2 + 0.5, zs + n * tread / 2);
    rail.rotation.x = Math.atan2(n * tread, topY); g.add(rail);
    // 2층 현관문
    const d2 = plainPlane(doorMat, 1.0, 1.9); d2.rotation.y = Math.PI / 2; d2.position.set(0.04, topY + 0.95, SEG / 2 - 0.7); g.add(d2);
  }

  // 에어컨 실외기
  if (r(11) > 0.5) {
    const ac = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 0.8), concreteMat);
    ac.position.set(0.28, 3.4 + r(32) * 2.5, (r(33) - 0.5) * SEG * 0.6); g.add(ac);
  }

  // 지붕
  if (roofTile) {
    const eave = new THREE.Mesh(new THREE.BoxGeometry(depth + 0.7, 0.22, SEG + 0.7), tileMat);
    eave.position.set(-depth / 2, H + 0.05, 0); g.add(eave);
    const roof = new THREE.Mesh(new THREE.ConeGeometry(0.72, 1.3, 4), tileMat);
    roof.rotation.y = Math.PI / 4; roof.scale.set((depth + 0.5) / 1.0, 1, (SEG + 0.5) / 1.0);
    roof.position.set(-depth / 2, H + 0.7, 0); g.add(roof);
  } else {
    const par = new THREE.Mesh(new THREE.BoxGeometry(depth + 0.1, 0.5, SEG + 0.1), concreteMat);
    par.position.set(-depth / 2, H + 0.2, 0); g.add(par);
  }

  // 담장 (낮은 벽돌담, 골목 가장자리 = 로컬 +setback)
  if (wall) {
    const wH = 1.1, wallM = new THREE.Mesh(new THREE.BoxGeometry(0.3, wH, SEG), brickMat);
    wallM.position.set(setback, wH / 2, 0); g.add(wallM);
    const cap = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.14, SEG), concreteMat);
    cap.position.set(setback, wH + 0.07, 0); g.add(cap);
  }

  // 가로등 (있으면 정면 위) — 광원 위치를 userData에 기록
  if (lamp) {
    const ly = 5.0, lx = 0.5;
    const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.9, 6), railMat);
    arm.rotation.z = Math.PI / 2; arm.position.set(0.3, ly, 0); g.add(arm);
    const hood = new THREE.Mesh(new THREE.SphereGeometry(0.32, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2), hoodMat);
    hood.rotation.x = Math.PI; hood.position.set(lx, ly + 0.05, 0); g.add(hood);
    const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.14, 10, 8), lampGlassMat);
    bulb.position.set(lx, ly - 0.08, 0); g.add(bulb);
    // 바닥 빛웅덩이 — 빛이 지면까지 내려오는 연출
    const pool = new THREE.Mesh(new THREE.PlaneGeometry(5.5, 5.5), poolMat);
    pool.rotation.x = -Math.PI / 2; pool.position.set(lx + 0.5, 0.03, 0); g.add(pool);
    g.userData.lampLocal = new THREE.Vector3(lx, ly - 0.1, 0);
  }

  // 배치: 좌측은 그대로, 우측은 180° 회전
  g.rotation.y = side > 0 ? Math.PI : 0;
  g.position.set(side * (ROAD_HALF + setback), 0, i * SEG + SEG / 2);
  g.userData.lampWorld = null;
  if (g.userData.lampLocal) {
    const lw = g.userData.lampLocal.clone();
    if (side > 0) { lw.x = -lw.x; lw.z = -lw.z; }
    lw.x += side * (ROAD_HALF + setback); lw.z += i * SEG + SEG / 2;
    g.userData.lampWorld = lw;
  }
  return g;
}

// ---------- Scene ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0d16);
scene.fog = new THREE.FogExp2(0x1a1410, 0.024);

const camera = new THREE.PerspectiveCamera(66, innerWidth / innerHeight, 0.1, 140);
camera.position.set(0, 1.62, -4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(2, devicePixelRatio));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.35;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);
addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// 조명 (재질이 보일 최소한, 야간 톤)
scene.add(new THREE.AmbientLight(0x35415e, 0.7));
const hemi = new THREE.HemisphereLight(0x47557e, 0x2c2014, 0.85); scene.add(hemi);
const moon = new THREE.DirectionalLight(0xbcc8e4, 0.45); moon.position.set(-3, 12, -6); scene.add(moon);
// 가로등용 포인트 라이트 풀
const lampLights = [];
for (let k = 0; k < 10; k++) { const L = new THREE.PointLight(0xff9633, 0, 22, 1.5); scene.add(L); lampLights.push(L); }

// 달
const moonMesh = new THREE.Mesh(new THREE.SphereGeometry(3, 24, 24), new THREE.MeshBasicMaterial({ color: 0xf1ecd6 }));
scene.add(moonMesh);

// 바닥
roadMap.repeat.set(ROAD_HALF * 2 / 2, 200 / 2);
const ground = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_HALF * 6, 600),
  new THREE.MeshStandardMaterial({ map: roadMap, roughness: 0.85, color: 0x6a635a, metalness: 0.1 }));
ground.rotation.x = -Math.PI / 2; ground.position.z = 200; scene.add(ground);

// ---------- 비 (on/off) ----------
const RN = 800, RH = 16;
const rainDrops = [];
for (let k = 0; k < RN; k++) rainDrops.push({
  x: (Math.random() - 0.5) * 22, z: (Math.random() - 0.5) * 22,
  y: Math.random() * RH, len: 0.3 + Math.random() * 0.5, sp: 9 + Math.random() * 6,
});
const rainGeo = new THREE.BufferGeometry();
const rainPos = new Float32Array(RN * 6);
rainGeo.setAttribute("position", new THREE.BufferAttribute(rainPos, 3));
const rainMesh = new THREE.LineSegments(rainGeo, new THREE.LineBasicMaterial({ color: 0xaecbe6, transparent: true, opacity: 0.32, fog: true }));
rainMesh.frustumCulled = false; scene.add(rainMesh);
let rainOn = true;
function updateRain(dt) {
  rainMesh.visible = rainOn;
  if (!rainOn) return;
  for (let k = 0; k < RN; k++) {
    const d = rainDrops[k];
    d.y -= d.sp * dt; if (d.y < 0) d.y += RH;
    const i = k * 6, bx = camera.position.x + d.x, bz = camera.position.z + d.z, by = camera.position.y + d.y - RH * 0.4;
    rainPos[i] = bx; rainPos[i + 1] = by; rainPos[i + 2] = bz;
    rainPos[i + 3] = bx + 0.18; rainPos[i + 4] = by - d.len; rainPos[i + 5] = bz;
  }
  rainGeo.attributes.position.needsUpdate = true;
}

// ---------- 트레드밀(무한 골목) ----------
const houses = new Map();
const POOL = 15;
function disposeGroup(g) { g.traverse(o => { if (o.geometry) o.geometry.dispose(); }); }
function syncHouses() {
  const ci = Math.floor(camera.position.z / SEG);
  const want = new Set();
  for (let i = ci - 2; i <= ci + POOL; i++) for (const s of [-1, 1]) {
    const key = i + "_" + s; want.add(key);
    if (!houses.has(key)) { const g = makeHouse(i, s); scene.add(g); houses.set(key, g); }
  }
  for (const [key, g] of houses) if (!want.has(key)) { scene.remove(g); disposeGroup(g); houses.delete(key); }
}
function updateLamps() {
  const cands = [];
  for (const g of houses.values()) if (g.userData.lampWorld) {
    const d = g.userData.lampWorld.distanceTo(camera.position);
    if (d < 40) cands.push([d, g.userData.lampWorld]);
  }
  cands.sort((a, b) => a[0] - b[0]);
  for (let k = 0; k < lampLights.length; k++) {
    if (k < cands.length) { lampLights[k].position.copy(cands[k][1]); lampLights[k].intensity = 17; }
    else lampLights[k].intensity = 0;
  }
}

// ---------- 입력 ----------
const keys = {};
let yaw = 0, pitch = 0, dragging = false, lastX = 0, lastY = 0, walkClick = false, started = false;
const title = document.getElementById("title"), hud = document.getElementById("hud");
function start() { if (!started) { started = true; title.classList.add("hidden"); } }
addEventListener("keydown", e => { const k = e.key.toLowerCase(); keys[k] = true; start(); if (k === "r") rainOn = !rainOn; });
addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });
renderer.domElement.addEventListener("pointerdown", e => { dragging = true; walkClick = true; lastX = e.clientX; lastY = e.clientY; start(); });
addEventListener("pointerup", () => { dragging = false; walkClick = false; });
addEventListener("pointermove", e => {
  if (!dragging) return;
  yaw -= (e.clientX - lastX) * 0.003; pitch -= (e.clientY - lastY) * 0.003;
  pitch = Math.max(-0.5, Math.min(0.4, pitch)); lastX = e.clientX; lastY = e.clientY;
  if (Math.abs(e.clientX - lastX) > 2) walkClick = false;
});

// ---------- 루프 ----------
const vel = new THREE.Vector3();
let last = performance.now(), dist = 0;
function loop(t) {
  const dt = Math.min(0.05, (t - last) / 1000); last = t;
  // 이동 (yaw 기준 전/후, 좌우 스트레이프)
  const fwd = (keys["w"] || keys["arrowup"] || walkClick ? 1 : 0) - (keys["s"] || keys["arrowdown"] ? 1 : 0);
  const strafe = (keys["d"] || keys["arrowright"] ? 1 : 0) - (keys["a"] || keys["arrowleft"] ? 1 : 0);
  const dir = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
  const rightV = new THREE.Vector3(-Math.cos(yaw), 0, Math.sin(yaw)); // 화면 기준 우측
  vel.addScaledVector(dir, fwd * 22 * dt);
  vel.addScaledVector(rightV, strafe * 16 * dt);
  vel.multiplyScalar(0.86);
  camera.position.addScaledVector(vel, dt);
  camera.position.x = Math.max(-(ROAD_HALF - 0.8), Math.min(ROAD_HALF - 0.8, camera.position.x));
  camera.position.y = 1.62 + Math.sin(t * 0.006) * Math.min(0.04, vel.length() * 0.02);
  // 시선
  const look = camera.position.clone().add(new THREE.Vector3(Math.sin(yaw) * Math.cos(pitch), Math.sin(pitch), Math.cos(yaw) * Math.cos(pitch)));
  camera.lookAt(look);
  // 달/바닥 따라오기
  moonMesh.position.set(camera.position.x + 6, 22, camera.position.z + 60);
  ground.position.z = camera.position.z + 100;

  syncHouses();
  updateLamps();
  updateRain(dt);
  dist = Math.max(dist, camera.position.z + 4);
  hud.innerHTML = `걸은 거리 <b>${Math.max(0, dist).toFixed(0)}</b> m · WebGL 3D · R 비 <b>${rainOn ? "켜짐" : "꺼짐"}</b> · 마우스 드래그 둘러보기`;
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
